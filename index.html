<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogiSoft</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 2rem 0;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
        }
        
        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }
        
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        section {
            margin: 2rem 0;
        }
        
        section h2 {
            color: #667eea;
            margin-bottom: 1rem;
        }
        
        footer {
            background: #f5f5f5;
            text-align: center;
            padding: 1.5rem;
            margin-top: 2rem;
            border-top: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <header>
        <h1>🚀 LogiSoft</h1>
        <p>Welcome to LogiSoft - Your Solution Hub</p>
    </header>
    
    <main>
        <section>
            <h2>About LogiSoft</h2>
            <p>LogiSoft is a modern software project designed to streamline and optimize your workflow.</p>
        </section>
        
        <section>
            <h2>Getting Started</h2>
            <p>Visit the <a href="https://github.com/prashant188/logisoft">GitHub repository</a> to learn more and contribute.</p>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 LogiSoft. All rights reserved.</p>
    </footer>
</body>
</html>
